repos:

  - repo: https://github.com/ruffle-rs/ruff
    rev: v0.0.241
    hooks:
      - id: ruff

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.1.0
    hooks:
      - id: sqlfluff-lint

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
